services:
  - type: web
    name: legacyfx-backend
    env: docker
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: BETTER_AUTH_SECRET
        sync: false
      - key: ABLY_API_KEY
        sync: false
      - key: UPLOADTHING_SECRET
        sync: false
      - key: UPLOADTHING_APP_ID
        sync: false
      - key: FRONTEND_URL
        sync: false